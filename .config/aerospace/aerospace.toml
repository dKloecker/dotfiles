config-version = 2

# =============================================================================
# AEROSPACE WINDOW MANAGER CONFIGURATION
# =============================================================================
#
# Two modes, one mental model:
#
#   MAIN MODE  (Glove80 nav layer / any keyboard with arrows)
#     Directions: ARROW KEYS
#     Designed to coexist with macOS word-nav (alt + arrow), so window
#     ops live one modifier deeper than they used to.
#
#   VIM MODE  (laptop, hjkl)
#     Directions: H J K L
#     Lives behind a mode toggle, so it's free to use lighter modifiers вҖ”
#     alt+arrow word-nav isn't a concern when 'h' is the direction key.
#     Toggle in with Alt+Space, toggle out with Alt+Space or Esc.
#
# -----------------------------------------------------------------------------
# Modifier philosophy
# -----------------------------------------------------------------------------
#
#   cmd   вҶ’  WORKSPACE-level     (jumping rooms)
#   ctrl  вҶ’  WINDOW-level        (focus / move within a room)
#   shift вҶ’  "вҖҰand bring the window with me"
#   alt   вҶ’  "this is an AeroSpace command, not a regular keypress"
#
# So every binding reads like a sentence:
#
#   alt + cmd        + arrow  вҶ’  go to that workspace
#   alt + cmd + shift + arrow вҶ’  go to that workspace AND bring this window
#   alt + ctrl       + arrow  вҶ’  focus the window in that direction
#   alt + ctrl + shift + arrow вҶ’  move this window in that direction
#   alt + ctrl + cmd  + arrow вҶ’  merge with the window in that direction
#
# Vim mode follows the same logic but drops one modifier where it can,
# because being in a mode already disambiguates "this is a WM command":
#
#   alt              + hjkl   вҶ’  focus
#   alt + shift      + hjkl   вҶ’  move
#   alt + cmd        + hjkl   вҶ’  workspace
#   alt + cmd + shift + hjkl  вҶ’  send window to workspace
#   alt + ctrl       + hjkl   вҶ’  merge
#
# Workspaces are spatial вҖ” L, R, U, D вҖ” arranged like a compass:
#
#                     в”Ңв”Җв”Җв”Җв”җ
#                     в”Ӯ U в”Ӯ
#                 в”Ңв”Җв”Җв”Җв”јв”Җв”Җв”Җв”јв”Җв”Җв”Җв”җ
#                 в”Ӯ L в”Ӯ   в”Ӯ R в”Ӯ
#                 в””в”Җв”Җв”Җв”јв”Җв”Җв”Җв”јв”Җв”Җв”Җв”ҳ
#                     в”Ӯ D в”Ӯ
#                     в””в”Җв”Җв”Җв”ҳ
#
# =============================================================================


# -----------------------------------------------------------------------------
# General Settings
# -----------------------------------------------------------------------------

start-at-login = true

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 30

default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

on-focused-monitor-changed = ['move-mouse monitor-lazy-center']


# -----------------------------------------------------------------------------
# Gaps
# -----------------------------------------------------------------------------
[gaps]
inner.horizontal = 10
inner.vertical   = 10
outer.left       = 10
outer.right      = 10
outer.top        = 10
outer.bottom     = 10


# -----------------------------------------------------------------------------
# Exec environment
# -----------------------------------------------------------------------------
[exec]
inherit-env-vars = true

[exec.env-vars]
PATH = '/opt/homebrew/bin:/opt/homebrew/sbin:${PATH}'


# -----------------------------------------------------------------------------
# Key Mapping
# -----------------------------------------------------------------------------
[key-mapping]
preset = 'qwerty'


# =============================================================================
#  в–Ҳв–Җв–„в–Җв–Ҳ в–„в–Җв–Ҳ в–Ҳ в–Ҳв–„в–‘в–Ҳ   в–Ҳв–Җв–„в–Җв–Ҳ в–Ҳв–Җв–Ҳ в–Ҳв–Җв–„ в–Ҳв–Җв–Җ
#  в–Ҳв–‘в–Җв–‘в–Ҳ в–Ҳв–Җв–Ҳ в–Ҳ в–Ҳв–‘в–Җв–Ҳ   в–Ҳв–‘в–Җв–‘в–Ҳ в–Ҳв–„в–Ҳ в–Ҳв–„в–Җ в–Ҳв–Ҳв–„
#
#  Default mode. Arrow-key directions.
#  Crucially: alt+arrow and alt+shift+arrow are LEFT FREE for macOS
#  word navigation and word selection. AeroSpace bindings start at
#  alt+ctrl+arrow and alt+cmd+arrow.
# =============================================================================
[mode.main.binding]


# ---------------------
# Mode switching
# ---------------------

# Enter vim mode (hjkl)
alt-space = 'mode vim'

# Enter service mode (config reload, layout reset, etc.)
alt-shift-semicolon = 'mode service'


# ---------------------
# Disable conflicting macOS shortcuts
# ---------------------
cmd-h     = []
cmd-alt-h = []


# ---------------------
# Layout toggles
# ---------------------
alt-shift-f = 'layout floating tiling'    # float вҶ” tile the focused window
alt-slash   = 'layout horizontal vertical' # flip split direction
alt-comma   = 'layout tiles accordion'     # tiles вҶ” accordion
alt-shift-m = 'fullscreen'                 # toggle fullscreen


# ---------------------
# Resize
# ---------------------
alt-minus = 'resize smart -50'
alt-equal = 'resize smart +50'


# ---------------------
# Focus window  (alt + ctrl + arrow)
# ---------------------
alt-ctrl-left  = 'focus left'
alt-ctrl-down  = 'focus down'
alt-ctrl-up    = 'focus up'
alt-ctrl-right = 'focus right'


# ---------------------
# Move window within workspace  (alt + ctrl + shift + arrow)
# ---------------------
alt-ctrl-shift-left  = 'move left'
alt-ctrl-shift-down  = 'move down'
alt-ctrl-shift-up    = 'move up'
alt-ctrl-shift-right = 'move right'


# ---------------------
# Jump to directional workspace  (alt + cmd + arrow)
# ---------------------
alt-cmd-left  = 'workspace L'
alt-cmd-down  = 'workspace D'
alt-cmd-up    = 'workspace U'
alt-cmd-right = 'workspace R'


# ---------------------
# Send window to directional workspace and follow  (alt + cmd + shift + arrow)
# ---------------------
alt-cmd-shift-left  = ['move-node-to-workspace L', 'workspace L']
alt-cmd-shift-down  = ['move-node-to-workspace D', 'workspace D']
alt-cmd-shift-up    = ['move-node-to-workspace U', 'workspace U']
alt-cmd-shift-right = ['move-node-to-workspace R', 'workspace R']


# ---------------------
# Join / merge with neighbour  (alt + ctrl + cmd + arrow)
# Less frequent op, lives on the busier three-modifier combo.
# ---------------------
alt-ctrl-cmd-left  = 'join-with left'
alt-ctrl-cmd-down  = 'join-with down'
alt-ctrl-cmd-up    = 'join-with up'
alt-ctrl-cmd-right = 'join-with right'


# ---------------------
# Workspace utilities
# ---------------------
alt-ctrl-tab = 'workspace-back-and-forth'
alt-ctrl-shift-tab      = 'move-workspace-to-monitor --wrap-around next'


# =============================================================================
#  в–Ҳв–‘в–Ҳ в–Ҳ в–Ҳв–Җв–„в–Җв–Ҳ   в–Ҳв–Җв–„в–Җв–Ҳ в–Ҳв–Җв–Ҳ в–Ҳв–Җв–„ в–Ҳв–Җв–Җ
#  в–Җв–„в–Җ в–Ҳ в–Ҳв–‘в–Җв–‘в–Ҳ   в–Ҳв–‘в–Җв–‘в–Ҳ в–Ҳв–„в–Ҳ в–Ҳв–„в–Җ в–Ҳв–Ҳв–„
#
#  Vim mode. HJKL directions. Lighter modifiers вҖ” being in the mode is
#  itself a disambiguator, so we don't need 'alt+ctrl' just to mean
#  "this is a window command."
#
#  The relationship to main mode:
#     main  alt+ctrl + arrow    вүЎ   vim  alt + hjkl       (focus)
#     main  alt+ctrl+shift+arrow вүЎ   vim  alt+shift + hjkl (move)
#     main  alt+cmd + arrow      вүЎ   vim  alt+cmd + hjkl   (workspace)
#     ...etc. Same actions, lighter chord.
# =============================================================================
[mode.vim.binding]


# ---------------------
# Mode switching
# ---------------------
alt-space           = 'mode main'   # exit vim mode
esc                 = 'mode main'   # also exits (vim muscle memory)
alt-shift-semicolon = 'mode service'


# ---------------------
# Disable conflicting macOS shortcuts
# ---------------------
cmd-h = []


# ---------------------
# Layout toggles  (identical to main mode)
# ---------------------
alt-shift-f = 'layout floating tiling'
alt-slash   = 'layout horizontal vertical'
alt-comma   = 'layout tiles accordion'
alt-shift-m = 'fullscreen'


# ---------------------
# Resize  (identical to main mode)
# ---------------------
alt-minus = 'resize smart -50'
alt-equal = 'resize smart +50'


# ---------------------
# Focus window  (alt + hjkl)
# ---------------------
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'


# ---------------------
# Move window within workspace  (alt + shift + hjkl)
# ---------------------
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'


# ---------------------
# Jump to directional workspace  (alt + cmd + hjkl)
# ---------------------
alt-cmd-h = 'workspace L'
alt-cmd-j = 'workspace D'
alt-cmd-k = 'workspace U'
alt-cmd-l = 'workspace R'


# ---------------------
# Send window to directional workspace and follow  (alt + cmd + shift + hjkl)
# Mirrors the main-mode 'shift = bring the window' rule.
# Note: this is much friendlier than the old 4-modifier combo.
# ---------------------
alt-cmd-shift-h = ['move-node-to-workspace L', 'workspace L']
alt-cmd-shift-j = ['move-node-to-workspace D', 'workspace D']
alt-cmd-shift-k = ['move-node-to-workspace U', 'workspace U']
alt-cmd-shift-l = ['move-node-to-workspace R', 'workspace R']


# ---------------------
# Join / merge with neighbour  (alt + ctrl + hjkl)
# In vim mode 'alt + hjkl' is focus, so merge gets the next combo up.
# ---------------------
alt-ctrl-h = 'join-with left'
alt-ctrl-j = 'join-with down'
alt-ctrl-k = 'join-with up'
alt-ctrl-l = 'join-with right'


# ---------------------
# Workspace utilities  (identical to main mode)
# ---------------------
alt-tab       = 'workspace-back-and-forth'
alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'


# =============================================================================
#  SERVICE MODE  вҖ“  Maintenance commands
#  Enter from either main or vim mode with Alt + Shift + ;
# =============================================================================
[mode.service.binding]

esc   = ['mode main']
enter = ['mode main']

r         = ['reload-config', 'mode main']
backspace = ['flatten-workspace-tree', 'mode main']
c         = ['close-all-windows-but-current', 'mode main']


# =============================================================================
# WINDOW RULES  вҖ“  apps that should always float
# =============================================================================
[[on-window-detected]]
if.app-name-regex-substring = 'finder'
run = 'layout floating'

[[on-window-detected]]
if.app-name-regex-substring = 'activity monitor'
run = 'layout floating'

[[on-window-detected]]
if.app-name-regex-substring = 'system preferences'
run = 'layout floating'

[[on-window-detected]]
if.app-name-regex-substring = 'system settings'
run = 'layout floating'

[[on-window-detected]]
if.app-name-regex-substring = 'calculator'
run = 'layout floating'
