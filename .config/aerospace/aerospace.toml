config-version = 2

# =============================================================================
# AEROSPACE WINDOW MANAGER CONFIGURATION
# =============================================================================

# -----------------------------------------------------------------------------
# General Settings
# Core behaviour: auto-start, window normalisation, and accordion padding
# -----------------------------------------------------------------------------
start-at-login = true
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true
accordion-padding = 30

# Default layout and orientation for the root container
default-root-container-layout = 'accordion'
default-root-container-orientation = 'auto'

# Move mouse to the centre of a newly focused monitor
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# -----------------------------------------------------------------------------
# Gaps
# Spacing between windows (inner) and between windows and screen edges (outer)
# -----------------------------------------------------------------------------
[gaps]
inner.horizontal = 10
inner.vertical   = 10
outer.left       = 10
outer.right      = 10
outer.top        = 10
outer.bottom     = 10

# -----------------------------------------------------------------------------
# Exec
# Environment variable inheritance and PATH configuration for launched apps
# -----------------------------------------------------------------------------
[exec]
inherit-env-vars = true

[exec.env-vars]
PATH = '/opt/homebrew/bin:/opt/homebrew/sbin:${PATH}'

# -----------------------------------------------------------------------------
# Key Mapping
# Keyboard layout preset
# -----------------------------------------------------------------------------
[key-mapping]
preset = 'qwerty'

# -----------------------------------------------------------------------------
# Main Mode Bindings
# Default keybindings for window management
# -----------------------------------------------------------------------------
[mode.main.binding]

# --- Layout ---
alt-shift-f = 'layout floating tiling'
alt-slash   = 'layout horizontal vertical'
alt-comma   = 'layout tiles accordion'

# --- Focus (vim-style) ---
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# --- Move windows (vim-style) ---
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# --- Resize ---
alt-minus = 'resize smart -50'
alt-equal = 'resize smart +50'

# --- macOS overrides: disable conflicting system shortcuts ---
cmd-h     = []
cmd-alt-h = []

# --- Workspace navigation ---
alt-left  = 'workspace left'
alt-right = 'workspace right'
alt-up    = 'workspace up'
alt-down  = 'workspace down'

ctrl-shift-alt-h  = 'workspace left'
ctrl-shift-alt-j  = 'workspace down'
ctrl-shift-alt-k  = 'workspace up'
ctrl-shift-alt-l  = 'workspace right'

# --- Move window to workspace ---
alt-shift-left  = 'move-node-to-workspace left'
alt-shift-right = 'move-node-to-workspace right'
alt-shift-up    = 'move-node-to-workspace up'
alt-shift-down  = 'move-node-to-workspace down'

ctrl-shift-alt-cmd-h = 'move-node-to-workspace left'
ctrl-shift-alt-cmd-j = 'move-node-to-workspace down'
ctrl-shift-alt-cmd-k = 'move-node-to-workspace up'
ctrl-shift-alt-cmd-l = 'move-node-to-workspace right'

# --- Join with (merge windows into containers) ---
alt-ctrl-h = 'join-with left'
alt-ctrl-j = 'join-with down'
alt-ctrl-k = 'join-with up'
alt-ctrl-l = 'join-with right'

# --- Workspace switching ---
alt-tab       = 'workspace-back-and-forth'
alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

# --- Enter service mode ---
cmd-alt-shift-enter = 'mode service'

# -----------------------------------------------------------------------------
# Service Mode Bindings
# Secondary mode for config management and app launching
# -----------------------------------------------------------------------------
[mode.service.binding]

# --- Exit service mode ---
esc   = ['mode main']
enter = ['mode main']

# --- Config management ---
r         = ['reload-config', 'mode main']
backspace = ['flatten-workspace-tree', 'mode main']
c         = ['close-all-windows-but-current', 'mode main']

# --- App launchers ---
# alt-c = 'exec-and-forget open -a "Claude"'

# -----------------------------------------------------------------------------
# Window Rules
# Automatically apply layouts and workspace assignments when apps are detected
# -----------------------------------------------------------------------------

# --- Floating: transient / utility apps ---
[[on-window-detected]]
if.app-name-regex-substring = 'finder'
run = 'layout floating'

[[on-window-detected]]
if.app-name-regex-substring = 'activity monitor'
run = 'layout floating'

# Uncomment to also float Mail
# [[on-window-detected]]
# if.app-name-regex-substring = 'mail'
# run = 'layout floating'
