config-version = 2

# =============================================================================
# AEROSPACE WINDOW MANAGER CONFIGURATION
# =============================================================================
#
# Two-mode design for dual-keyboard consistency:
#
#   MAIN MODE (default)  –  Directions use ARROW KEYS
#     → Used with split keyboard (Nav layer arrow codes)
#     → Also works on the laptop since arrow keys are universal
#
#   VIM MODE (toggle)    –  Directions use HJKL
#     → Used with the laptop's built-in keyboard for vim-style navigation
#     → Toggle in with Alt+Space, toggle out with Alt+Space or Esc
#
# Both modes share identical non-directional bindings (layout toggles,
# resize, etc.) so everything except the direction keys behaves the same
# regardless of which mode you're in.
#
# =============================================================================


# -----------------------------------------------------------------------------
# General Settings
# -----------------------------------------------------------------------------

# Launch Aerospace automatically at login
start-at-login = true

# Flatten nested containers that serve no purpose (keeps the tree clean)
enable-normalization-flatten-containers = true

# Auto-flip orientation when nesting would mirror the parent's direction
enable-normalization-opposite-orientation-for-nested-containers = true

# Padding inside accordion (stacked) layout around the focused window
accordion-padding = 30

# New workspaces start as tiled with auto-detected split orientation
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# Warp the mouse to the centre of a newly focused monitor
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']


# -----------------------------------------------------------------------------
# Gaps
# Inner = between adjacent windows, Outer = between windows and screen edges
# -----------------------------------------------------------------------------
[gaps]
inner.horizontal = 10
inner.vertical   = 10
outer.left       = 10
outer.right      = 10
outer.top        = 10
outer.bottom     = 10


# -----------------------------------------------------------------------------
# Exec – ensure Homebrew binaries are on PATH for launched processes
# -----------------------------------------------------------------------------
[exec]
inherit-env-vars = true

[exec.env-vars]
PATH = '/opt/homebrew/bin:/opt/homebrew/sbin:${PATH}'


# -----------------------------------------------------------------------------
# Key Mapping – QWERTY base (matches both laptop and Glove80 base layer)
# -----------------------------------------------------------------------------
[key-mapping]
preset = 'qwerty'


# =============================================================================
#  █▀▄▀█ ▄▀█ █ █▄░█   █▀▄▀█ █▀█ █▀▄ █▀▀
#  █░▀░█ █▀█ █ █░▀█   █░▀░█ █▄█ █▄▀ ██▄
#
#  Default mode. Directional bindings use ARROW KEYS.
#  Designed for the Glove80 Nav layer, but works on any keyboard.
# =============================================================================
[mode.main.binding]


# ---------------------
# Mode switching
# ---------------------

# Alt + Space  →  Enter vim mode (hjkl navigation for the laptop keyboard)
alt-space = 'mode vim'

# Alt + Shift + ;  →  Enter service mode (config reload, cleanup, etc.)
alt-shift-semicolon = 'mode service'


# ---------------------
# Disable conflicting macOS shortcuts
# Cmd-H hides the frontmost app; Cmd-Alt-H hides all others.
# We disable both so they don't swallow our bindings.
# ---------------------
cmd-h     = []
cmd-alt-h = []


# ---------------------
# Layout toggles
# ---------------------

# Toggle floating ↔ tiling for the focused window
alt-shift-f = 'layout floating tiling'

# Flip the container's split direction (horizontal ↔ vertical)
alt-slash = 'layout horizontal vertical'

# Switch between side-by-side tiles and stacked accordion
alt-comma = 'layout tiles accordion'

# Toggle fullscreen for the focused window
alt-shift-m = 'fullscreen'


# ---------------------
# Focus window  (Alt + arrow)
# Move keyboard focus to the adjacent window in that direction.
# ---------------------
alt-left  = 'focus left'
alt-down  = 'focus down'
alt-up    = 'focus up'
alt-right = 'focus right'


# ---------------------
# Move window  (Alt + Shift + arrow)
# Physically move the focused window within the tiling tree.
# ---------------------
alt-shift-left  = 'move left'
alt-shift-down  = 'move down'
alt-shift-up    = 'move up'
alt-shift-right = 'move right'


# ---------------------
# Resize
# Grow or shrink the focused window along its split axis.
# ---------------------
alt-minus = 'resize smart -50'
alt-equal = 'resize smart +50'


# ---------------------
# Navigate to directional workspace  (Alt + Ctrl + arrow)
# Workspaces are spatial: L (left), R (right), U (up), D (down).
# Think of it as four virtual desktops arranged in a compass around you.
#
#            ┌───┐
#            │ U │
#        ┌───┼───┼───┐
#        │ L │   │ R │
#        └───┼───┼───┘
#            │ D │
#            └───┘
#
# The direction you press is the workspace you land on.
# ---------------------
alt-cmd-left  = 'workspace L'
alt-cmd-down  = 'workspace D'
alt-cmd-up    = 'workspace U'
alt-cmd-right = 'workspace R'


# ---------------------
# Move window to directional workspace  (Alt + Ctrl + Shift + arrow)
# Send the focused window to that workspace and follow it there.
# ---------------------
alt-ctrl-shift-cmd-left  = ['move-node-to-workspace L', 'workspace L']
alt-ctrl-shift-cmd-down  = ['move-node-to-workspace D', 'workspace D']
alt-ctrl-shift-cmd-up    = ['move-node-to-workspace U', 'workspace U']
alt-ctrl-shift-cmd-right = ['move-node-to-workspace R', 'workspace R']


# ---------------------
# Join / merge containers  (Alt + Cmd + arrow)
# Merge the focused window into the adjacent container.
# Useful for building complex layouts (e.g. one tall pane + two short ones).
# ---------------------
alt-ctrl-left  = 'join-with left'
alt-ctrl-down  = 'join-with down'
alt-ctrl-up    = 'join-with up'
alt-ctrl-right = 'join-with right'


# ---------------------
# Workspace back-and-forth
# Alt-Tab toggles between the two most recent workspaces (like `cd -`).
# Alt-Shift-Tab moves the whole workspace to the next physical monitor.
# ---------------------
alt-tab       = 'workspace-back-and-forth'
alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'


# =============================================================================
#  █░█ █ █▀▄▀█   █▀▄▀█ █▀█ █▀▄ █▀▀
#  ▀▄▀ █ █░▀░█   █░▀░█ █▄█ █▄▀ ██▄
#
#  Vim mode. Directional bindings use HJKL.
#  Toggle in from main mode with Alt+Space.
#  Designed for the laptop's built-in keyboard.
# =============================================================================
[mode.vim.binding]


# ---------------------
# Mode switching
# ---------------------

# Alt + Space  →  Return to main mode (arrow-key navigation)
alt-space = 'mode main'

# Esc  →  Also returns to main mode (vim muscle memory: Esc exits modes)
esc = 'mode main'

# Alt + Shift + ;  →  Enter service mode (same hotkey as main mode)
alt-shift-semicolon = 'mode service'


# ---------------------
# Disable conflicting macOS shortcuts (must be repeated per mode)
# ---------------------
cmd-h = []


# ---------------------
# Layout toggles  (identical to main mode)
# ---------------------
alt-shift-f = 'layout floating tiling'
alt-slash   = 'layout horizontal vertical'
alt-comma   = 'layout tiles accordion'
alt-shift-m = 'fullscreen'


# ---------------------
# Focus window  (Alt + hjkl)
# Same action as main mode but with vim direction keys.
# ---------------------
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'


# ---------------------
# Move window  (Alt + Shift + hjkl)
# ---------------------
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'


# ---------------------
# Resize  (identical to main mode)
# ---------------------
alt-minus = 'resize smart -50'
alt-equal = 'resize smart +50'


# ---------------------
# Navigate to directional workspace  (Alt + Ctrl + hjkl)
# Same spatial workspaces as main mode (L/R/U/D), vim keys.
# ---------------------
alt-cmd-h = 'workspace L'
alt-cmd-j = 'workspace D'
alt-cmd-k = 'workspace U'
alt-cmd-l = 'workspace R'


# ---------------------
# Move window to directional workspace  (Alt + Ctrl + Shift + hjkl)
# ---------------------
alt-ctrl-shift-cmd-h = ['move-node-to-workspace L', 'workspace L']
alt-ctrl-shift-cmd-j = ['move-node-to-workspace D', 'workspace D']
alt-ctrl-shift-cmd-k = ['move-node-to-workspace U', 'workspace U']
alt-ctrl-shift-cmd-l = ['move-node-to-workspace R', 'workspace R']


# ---------------------
# Join / merge containers  (Alt + Cmd + hjkl)
# No conflict here because we don't need cmd-alt-h = [] in vim mode;
# the binding itself overrides the macOS shortcut.
# ---------------------
alt-ctrl-h = 'join-with left'
alt-ctrl-j = 'join-with down'
alt-ctrl-k = 'join-with up'
alt-ctrl-l = 'join-with right'


# ---------------------
# Workspace back-and-forth  (identical to main mode)
# ---------------------
alt-tab       = 'workspace-back-and-forth'
alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'


# =============================================================================
#  SERVICE MODE  –  Config management and maintenance
#  Enter from either main or vim mode with Alt+Shift+;
# =============================================================================
[mode.service.binding]

# Return to main mode (not vim — service mode is rare, defaulting to main
# is the safest landing spot)
esc   = ['mode main']
enter = ['mode main']

# Reload the Aerospace config from disk
r = ['reload-config', 'mode main']

# Flatten the workspace tree (remove empty intermediate containers)
backspace = ['flatten-workspace-tree', 'mode main']

# Close every window on the workspace except the focused one
c = ['close-all-windows-but-current', 'mode main']


# =============================================================================
# WINDOW RULES
# Automatically float apps that don't tile well
# =============================================================================
[[on-window-detected]]
if.app-name-regex-substring = 'finder'
run = 'layout floating'

[[on-window-detected]]
if.app-name-regex-substring = 'activity monitor'
run = 'layout floating'

[[on-window-detected]]
if.app-name-regex-substring = 'system preferences'
run = 'layout floating'

[[on-window-detected]]
if.app-name-regex-substring = 'system settings'
run = 'layout floating'

[[on-window-detected]]
if.app-name-regex-substring = 'calculator'
run = 'layout floating'
